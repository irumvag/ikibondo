version: '3.9'

services:

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ikibondo
      POSTGRES_USER: ikibondo
      POSTGRES_PASSWORD: ikibondo
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ikibondo"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ../../
      dockerfile: infra/docker/Dockerfile.backend
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3"
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.prod
    env_file:
      - ../../backend/.env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - media_files:/app/media

  celery:
    build:
      context: ../../
      dockerfile: infra/docker/Dockerfile.backend
    command: celery -A config worker --loglevel=info --concurrency=2
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.prod
    env_file:
      - ../../backend/.env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery-beat:
    build:
      context: ../../
      dockerfile: infra/docker/Dockerfile.backend
    command: celery -A config beat --loglevel=info
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.prod
    env_file:
      - ../../backend/.env
    depends_on:
      - celery

volumes:
  postgres_data:
  media_files:
