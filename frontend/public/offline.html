<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline — Ikibondo</title>
  <style>
    body { font-family: system-ui, sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; background: #f9f6f0; color: #1a1a1a; }
    .box { text-align: center; padding: 2rem; max-width: 360px; }
    h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
    p { color: #666; margin-bottom: 1.5rem; }
    button { padding: 0.75rem 1.5rem; background: #1a1a1a; color: #fff; border: none; border-radius: 0.75rem; cursor: pointer; font-size: 1rem; }
    button:hover { opacity: 0.85; }
  </style>
</head>
<body>
  <div class="box">
    <h1>You're offline</h1>
    <p>Ikibondo needs a connection for this page. Data recorded offline will sync when you reconnect.</p>
    <button onclick="window.location.reload()">Try again</button>
  </div>
</body>
</html>
